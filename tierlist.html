<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>SiumCraft Leaderboard</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  color:white;
  background: url("https://images.unsplash.com/photo-1605902711622-cfb43c44367f") no-repeat center center fixed;
  background-size:cover;
}

body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
}

h1{
  text-align:center;
  position:relative;
}

.container{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  position:relative;
}

.card{
  background:#1e293bdd;
  margin:20px;
  padding:20px;
  border-radius:15px;
  width:350px;
}

.player{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  margin:5px 0;
  background:#020617aa;
  border-radius:10px;
  transition:0.2s;
}

.player:hover{
  transform:scale(1.05);
}

.left{
  display:flex;
  align-items:center;
}

.player img{
  width:35px;
  margin-right:10px;
  border-radius:8px;
}

a{
  color:white;
  text-decoration:none;
  font-weight:bold;
}

.top1{
  background:gold;
  color:black;
}
</style>
</head>

<body>

<h1>🏆 SiumCraft Leaderboard</h1>

<div class="container">

<div class="card">
<h2>⚔️ Kill Sıralaması</h2>
<div id="kills"></div>
</div>

<div class="card">
<h2>💀 Death Sıralaması</h2>
<div id="deaths"></div>
</div>

</div>

<script>

async function guncelle(){
  let res = await fetch("data.json");
  let data = await res.json();

  // KILL
  let kills = [...data].sort((a,b)=>b.kills-a.kills);
  let htmlK = "";

  kills.forEach((p,i)=>{
    let crown = i==0 ? "👑 " : "";
    let topClass = i==0 ? "top1" : "";

    htmlK += `
    <div class="player ${topClass}">
      <div class="left">
        <img src="https://mc-heads.net/avatar/${p.name}">
        <a href="profil.html?nick=${p.name}">
          ${crown}#${i+1} ${p.name}
        </a>
      </div>
      <span>${p.kills}</span>
    </div>`;
  });

  document.getElementById("kills").innerHTML = htmlK;

  // DEATH
  let deaths = [...data].sort((a,b)=>b.deaths-a.deaths);
  let htmlD = "";

  deaths.forEach((p,i)=>{
    htmlD += `
    <div class="player">
      <div class="left">
        <img src="https://mc-heads.net/avatar/${p.name}">
        <a href="profil.html?nick=${p.name}">
          #${i+1} ${p.name}
        </a>
      </div>
      <span>${p.deaths}</span>
    </div>`;
  });

  document.getElementById("deaths").innerHTML = htmlD;
}

guncelle();
setInterval(guncelle, 60000);

</script>

</body>
</html>
