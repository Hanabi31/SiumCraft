<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Leaderboard</title>

<style>
body{
background:#020617;
color:white;
font-family:sans-serif;
text-align:center;
}

.player{
display:flex;
justify-content:space-between;
margin:10px;
padding:15px;
background:#111;
border-radius:10px;
}

.top1{box-shadow:0 0 20px gold;}
.top2{background:silver;color:black;}
.top3{background:#cd7f32;}
</style>
</head>

<body>

<h1>🏆 Leaderboard</h1>
<div id="list"></div>

<script>
async function load(){
let r = await fetch("data.json");
let p = await r.json();

p.sort((a,b)=>b.kills-a.kills);

let html="";

p.forEach((x,i)=>{
let cls = i==0?"top1":i==1?"top2":i==2?"top3":"";

html+=`
<div class="player ${cls}">
<span>#${i+1} ${x.name}</span>
<span>${x.kills}/${x.deaths}</span>
</div>`;
});

document.getElementById("list").innerHTML=html;
}

load();
</script>

</body>
</html>
