<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>SiumCraft Leaderboard</title>

<style>
body{
  background:#0f172a;
  color:white;
  font-family:sans-serif;
  text-align:center;
}

h1{
  margin-top:20px;
}

.container{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
}

.card{
  background:#1e293b;
  margin:20px;
  padding:20px;
  border-radius:15px;
  width:300px;
}

.player{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:8px;
  border-bottom:1px solid #333;
}

.player img{
  width:25px;
  margin-right:5px;
}
</style>
</head>

<body>

<h1>🏆 SiumCraft Leaderboard</h1>

<div class="container">

<div class="card">
<h2>⚔️ Kill Sıralaması</h2>
<div id="kills"></div>
</div>

<div class="card">
<h2>💀 Death Sıralaması</h2>
<div id="deaths"></div>
</div>

</div>

<script>

async function guncelle(){

  let res = await fetch("data.json");
  let data = await res.json();

  // kill sıralama
  let kills = [...data].sort((a,b)=>b.kills-a.kills);
  let htmlK = "";
  kills.forEach((p,i)=>{
    htmlK += `
    <div class="player">
      <span>#${i+1} ${p.name}</span>
      <span>${p.kills}</span>
    </div>`;
  });
  document.getElementById("kills").innerHTML = htmlK;

  // death sıralama
  let deaths = [...data].sort((a,b)=>b.deaths-a.deaths);
  let htmlD = "";
  deaths.forEach((p,i)=>{
    htmlD += `
    <div class="player">
      <span>#${i+1} ${p.name}</span>
      <span>${p.deaths}</span>
    </div>`;
  });
  document.getElementById("deaths").innerHTML = htmlD;

}

// ilk yükleme
guncelle();

// 🔄 1 DAKİKADA BİR YENİLE
setInterval(guncelle, 60000);

</script>

</body>
</html>
