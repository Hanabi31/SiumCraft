<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SiumCraft Giriş</title>

<style>
body{
  background:#020617;
  color:white;
  font-family:sans-serif;
  text-align:center;
  padding-top:100px;
}

input{
  padding:12px;
  margin:10px;
  border-radius:10px;
  border:none;
  width:200px;
}

button{
  padding:12px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:black;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>🎮 Giriş Yap</h1>

<input id="nick" placeholder="Minecraft Nick">
<br>
<button onclick="login()">Giriş</button>

<script>
function login(){
  let nick = document.getElementById("nick").value;

  if(nick==""){
    alert("Nick gir!");
    return;
  }

  localStorage.setItem("nick", nick);
  window.location.href="panel2.html";
}
</script>

</body>
</html>
