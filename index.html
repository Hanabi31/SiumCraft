<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>SiumCraft</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:sans-serif;
  color:white;
  overflow-x:hidden;
}

/* VIDEO BACKGROUND */
video{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-1;
}

/* DARK OVERLAY */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  z-index:-1;
}

/* NAVBAR */
.nav{
  display:flex;
  justify-content:space-between;
  padding:20px;
  background:rgba(0,0,0,0.5);
}

.logo{
  font-size:28px;
  color:#22c55e;
  font-weight:bold;
}

.nav a{
  margin-left:20px;
  text-decoration:none;
  color:white;
  font-size:18px;
}

/* HERO */
.hero{
  height:90vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1{
  font-size:60px;
}

.hero p{
  font-size:22px;
  margin:10px 0;
  color:#ccc;
}

/* BUTTON */
.btn{
  padding:15px 30px;
  margin:10px;
  border:none;
  border-radius:12px;
  font-size:18px;
  cursor:pointer;
}

.ip{background:#22c55e;color:black;}
.dc{background:#5865F2;color:white;}
.panel{background:#f59e0b;color:black;}

/* STATUS */
.status{
  margin-top:20px;
  background:rgba(0,0,0,0.7);
  padding:20px;
  border-radius:15px;
  width:350px;
}

.online{color:#22c55e;}
.offline{color:red;}

</style>
</head>

<body>

<!-- VIDEO -->
<video autoplay muted loop>
  <source src="https://cdn.coverr.co/videos/coverr-minecraft-style-world-5176/1080p.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="nav">
  <div class="logo">SiumCraft</div>
  <div>
    <a href="index.html">Ana Sayfa</a>
    <a href="tierlist.html">Sıralama</a>
    <a href="panel.html">Panel</a>
    <a href="support.html">Destek</a>
  </div>
</div>

<div class="hero">
  <h1>SiumCraft</h1>
  <p>Türkiye'nin en iyi SMP & PvP sunucusu</p>

  <div>
    <button class="btn ip" onclick="kopyala()">IP Kopyala</button>
    <button class="btn dc">Discord</button>
    <button class="btn panel" onclick="panel()">Panel</button>
  </div>

  <div class="status">
    <h3>Sunucu Durumu</h3>
    <p id="durum">Yükleniyor...</p>
    <p id="oyuncu"></p>
  </div>

</div>

<script>
function kopyala(){
  navigator.clipboard.writeText("siumcraft.aternos.me");
  alert("IP kopyalandı!");
}

// PANEL ÇALIŞIYOR
function panel(){
  window.location.href = "panel.html";
}

// SERVER API
async function durum(){
  try{
    let res = await fetch("https://api.mcsrvstat.us/2/siumcraft.aternos.me");
    let data = await res.json();

    if(data.online){
      document.getElementById("durum").innerHTML = "🟢 Online";
      document.getElementById("durum").className="online";
      document.getElementById("oyuncu").innerText = "Oyuncu: " + data.players.online;
    }else{
      document.getElementById("durum").innerHTML = "🔴 Offline";
      document.getElementById("durum").className="offline";
    }

  }catch{
    document.getElementById("durum").innerText = "Hata!";
  }
}

durum();
setInterval(durum,30000);
</script>

</body>
</html>
