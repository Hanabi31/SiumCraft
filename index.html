<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>SiumCraft</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:sans-serif;
  color:white;
  background:#0f172a;
}

/* NAVBAR */
.nav{
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
  background:#020617;
  position:fixed;
  width:100%;
  z-index:10;
}

.logo{
  color:#22c55e;
  font-weight:bold;
  font-size:20px;
}

.nav a{
  color:white;
  margin-left:20px;
  text-decoration:none;
}

/* HERO */
.hero{
  height:100vh;
  background:url("https://images.unsplash.com/photo-1587574293340-e0011c4e8ecf") center/cover;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero::before{
  content:"";
  position:absolute;
  width:100%;
  height:100vh;
  background:rgba(0,0,0,0.7);
}

.hero-content{
  position:relative;
}

.hero h1{
  font-size:40px;
  margin-bottom:10px;
}

.hero p{
  color:#ccc;
  margin-bottom:20px;
}

/* BUTTONS */
.btn{
  padding:12px 25px;
  margin:5px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.ip{background:#22c55e;color:black;}
.dc{background:#5865F2;color:white;}

/* CARDS */
.section{
  padding:60px 20px;
  text-align:center;
}

.cards{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

.card{
  background:#1e293b;
  padding:20px;
  margin:10px;
  border-radius:15px;
  width:250px;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

/* STATUS */
.status{
  background:#020617;
  padding:20px;
  border-radius:15px;
  width:300px;
  margin:20px auto;
}

.online{color:#22c55e;}
.offline{color:red;}
</style>
</head>

<body>

<div class="nav">
  <div class="logo">SiumCraft</div>
  <div>
    <a href="index.html">Ana Sayfa</a>
    <a href="tierlist.html">Sıralama</a>
    <a href="panel.html">Panel</a>
    <a href="support.html">Destek</a>
  </div>
</div>

<div class="hero">
  <div class="hero-content">
    <h1>SiumCraft</h1>
    <p>Türkiye'nin en iyi SMP & PvP sunucusu</p>

    <button class="btn ip" onclick="kopyala()">IP Kopyala</button>
    <button class="btn dc">Discord</button>

    <div class="status">
      <h3>Sunucu Durumu</h3>
      <p id="durum">Yükleniyor...</p>
      <p id="oyuncu"></p>
    </div>

  </div>
</div>

<div class="section">
  <h2>Özellikler</h2>
  <div class="cards">
    <div class="card">⚔️ PvP Sistemi</div>
    <div class="card">💰 Ekonomi</div>
    <div class="card">👑 Rank Sistemi</div>
  </div>
</div>

<script>
function kopyala(){
  navigator.clipboard.writeText("siumcraft.aternos.me");
  alert("IP kopyalandı!");
}

// SERVER API
async function durum(){
  try{
    let res = await fetch("https://api.mcsrvstat.us/2/siumcraft.aternos.me");
    let data = await res.json();

    if(data.online){
      document.getElementById("durum").innerHTML = "🟢 Online";
      document.getElementById("durum").className="online";
      document.getElementById("oyuncu").innerText = "Oyuncu: " + data.players.online;
    }else{
      document.getElementById("durum").innerHTML = "🔴 Offline";
      document.getElementById("durum").className="offline";
    }

  }catch{
    document.getElementById("durum").innerText = "Hata!";
  }
}

durum();
setInterval(durum,30000);
</script>

</body>
</html>
