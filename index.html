<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SiumCraft</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  color:white;
  background:url("https://images.alphacoders.com/998/998181.jpg") no-repeat center center/cover;
}

/* ÜST BAR */
.nav{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:rgba(0,0,0,0.7);
}

.nav a{
  color:white;
  margin:10px;
  text-decoration:none;
}

/* ORTA PANEL */
.panel{
  text-align:center;
  margin-top:120px;
  background:rgba(0,0,0,0.7);
  padding:30px;
  border-radius:20px;
  width:90%;
  max-width:400px;
  margin-left:auto;
  margin-right:auto;
}

button{
  padding:12px 25px;
  margin:10px;
  border:none;
  border-radius:10px;
  background:#00ffcc;
  font-size:16px;
}

</style>
</head>

<body>

<div class="nav">
  <div>SiumCraft</div>
  <div>
    <a href="index.html">Ana Sayfa</a>
    <a href="shop.html">Mağaza</a>
    <a href="support.html">Destek</a>
  </div>
</div>

<div class="panel">
  <h1>SiumCraft Panel</h1>

  <button onclick="kopyala()">IP Kopyala</button>
  <button onclick="discord()">Discord</button>

  <p id="durum">Yükleniyor...</p>
</div>

<script>

// IP KOPYALA
function kopyala(){
  navigator.clipboard.writeText("siumcraft.aternos.me");
  alert("IP kopyalandı!");
}

// DISCORD
function discord(){
  window.location.href="https://discord.gg/SiumCraft"; // BURAYA KENDİ LİNKİNİ KOY
}

// SUNUCU DURUM
async function durum(){
  let res = await fetch("https://api.mcsrvstat.us/2/siumcraft.aternos.me");
  let data = await res.json();

  if(data.online){
    document.getElementById("durum").innerHTML =
    "🟢 "+data.players.online+" oyuncu aktif";
  }else{
    document.getElementById("durum").innerHTML =
    "🔴 Sunucu offline";
  }
}

durum();

</script>

</body>
</html>
