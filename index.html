<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SiumCraft</title>

<!-- Daha güzel font -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Orbitron', sans-serif;
  color: white;
  overflow-x: hidden;
}

/* FULL BACKGROUND */
#bgCanvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  z-index: -1;
  background: linear-gradient(120deg, #0f2027, #203a43, #2c5364);
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(0,0,0,0.85);
  padding: 15px 40px;
  position: fixed;
  width: 100%;
  z-index: 10;
}

.logo {
  color: #00ffcc;
  font-weight: bold;
}

.navbar ul {
  display: flex;
  list-style: none;
}

.navbar ul li {
  margin-left: 25px;
}

.navbar ul li a {
  color: white;
  text-decoration: none;
  cursor: pointer;
}

/* SECTIONS */
.section {
  min-height: 100vh;
  padding: 120px 20px;
  text-align: center;
}

.hero h1 {
  font-size: 40px;
}

.hero p {
  margin: 20px 0;
}

/* BUTTON */
.button {
  background: #00ffcc;
  padding: 12px 25px;
  border-radius: 8px;
  color: black;
  text-decoration: none;
  margin: 10px;
  display: inline-block;
}

/* CARDS */
.cards {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

.card {
  background: rgba(0,0,0,0.7);
  padding: 20px;
  border-radius: 10px;
  width: 250px;
}
</style>
</head>

<body>

<canvas id="bgCanvas"></canvas>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="logo">SiumCraft</div>
  <ul>
    <li><a onclick="scrollToSection('home')">Ana Sayfa</a></li>
    <li><a onclick="scrollToSection('server')">Sunucu</a></li>
    <li><a onclick="scrollToSection('shop')">Mağaza</a></li>
    <li><a onclick="scrollToSection('contact')">İletişim</a></li>
  </ul>
</nav>

<!-- HOME -->
<section id="home" class="section hero">
  <h1>SiumCraft</h1>
  <p>En iyi Minecraft deneyimi!</p>
  <p id="players">Yükleniyor...</p>

  <a class="button" onclick="copyIP()">IP Kopyala</a>
  <a href="minecraft://connect/siumcraft.aternos.me" class="button">Katıl</a>
</section>

<!-- SERVER -->
<section id="server" class="section">
  <h2>Sunucu</h2>
  <p>IP: siumcraft.aternos.me</p>
</section>

<!-- SHOP -->
<section id="shop" class="section">
  <h2>Mağaza</h2>
  <div class="cards">
    <div class="card">Gridük - 250₺</div>
    <div class="card">Arşidük+ - 500₺</div>
  </div>
</section>

<!-- CONTACT -->
<section id="contact" class="section">
  <h2>İletişim</h2>
  <p>Discord: eklenecek</p>
</section>

<script>
// SCROLL
function scrollToSection(id) {
  document.getElementById(id).scrollIntoView({ behavior: "smooth" });
}

// PARTICLES
const canvas = document.getElementById("bgCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
for (let i = 0; i < 100; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    vx: Math.random() * 0.5,
    vy: Math.random() * 0.5
  });
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    if (p.x > canvas.width) p.x = 0;
    if (p.y > canvas.height) p.y = 0;
    ctx.fillStyle = "#00ffcc";
    ctx.fillRect(p.x, p.y, 2, 2);
  });
  requestAnimationFrame(animate);
}
animate();

// API
fetch("https://api.mcsrvstat.us/2/siumcraft.aternos.me")
.then(res => res.json())
.then(data => {
  document.getElementById("players").innerText =
    data.online ? "🟢 " + data.players.online + " oyuncu" : "🔴 Kapalı";
});

// COPY
function copyIP() {
  navigator.clipboard.writeText("siumcraft.aternos.me");
  alert("IP kopyalandı!");
}
</script>

</body>
</html>
