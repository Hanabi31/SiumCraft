<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>SiumCraft Panel</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:sans-serif;
  color:white;
  background:url("https://wallpapercave.com/wp/wp2757874.gif") center/cover no-repeat fixed;
}

/* DARK */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.75);
}

/* PANEL */
.panel{
  position:relative;
  max-width:400px;
  margin:100px auto;
  background:#020617;
  padding:30px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 0 30px #22c55e;
}

/* TITLE */
.panel h1{
  font-size:28px;
  margin-bottom:20px;
}

/* BUTTON */
.btn{
  display:block;
  width:100%;
  padding:15px;
  margin:10px 0;
  border:none;
  border-radius:12px;
  font-size:16px;
  cursor:pointer;
  font-weight:bold;
}

.shop{background:#22c55e;color:black;}
.dc{background:#5865F2;}
.home{background:#f59e0b;color:black;}
.rank{background:#e11d48;}

/* STATUS */
.status{
  margin-top:20px;
  padding:15px;
  background:#000;
  border-radius:10px;
}

.online{color:#22c55e;}
.offline{color:red;}

</style>
</head>

<body>

<div class="overlay"></div>

<div class="panel">
  <h1>🎮 SiumCraft Panel</h1>

  <button class="btn shop" onclick="git('shop.html')">🛒 Mağaza</button>
  <button class="btn dc" onclick="dc()">💬 Discord</button>
  <button class="btn rank" onclick="git('tierlist.html')">🏆 Sıralama</button>
  <button class="btn home" onclick="git('index.html')">🏠 Ana Sayfa</button>

  <div class="status">
    <h3>Sunucu</h3>
    <p id="durum">Yükleniyor...</p>
  </div>
</div>

<script>

function git(link){
  window.location.href = link;
}

function dc(){
  window.location.href="https://discord.gg/SiumCraft"; // BURAYA KENDİ LİNKİNİ KOY
}

// SERVER
async function durum(){
  let res = await fetch("https://api.mcsrvstat.us/2/siumcraft.aternos.me");
  let data = await res.json();

  if(data.online){
    document.getElementById("durum").innerHTML="🟢 Online";
    document.getElementById("durum").className="online";
  }else{
    document.getElementById("durum").innerHTML="🔴 Offline";
    document.getElementById("durum").className="offline";
  }
}

durum();
setInterval(durum,30000);

</script>

</body>
</html>
