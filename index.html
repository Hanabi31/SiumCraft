<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>SiumCraft</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:sans-serif;
  color:white;
  background:url("https://wallpapercave.com/wp/wp2757874.gif") center/cover no-repeat fixed;
}

/* KARARTMA */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  z-index:-1;
}

/* NAVBAR */
.nav{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#000;
}

.logo{
  color:#22c55e;
  font-size:22px;
}

.nav a{
  color:white;
  margin-left:15px;
  text-decoration:none;
}

/* HERO */
.hero{
  height:90vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1{
  font-size:50px;
}

.hero p{
  color:#ccc;
  margin:10px;
}

/* BUTTON */
.btn{
  padding:12px 25px;
  margin:5px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-size:16px;
}

.ip{background:#22c55e;color:black;}
.dc{background:#5865F2;color:white;}
.panel{background:orange;color:black;}
.shop{background:#e11d48;color:white;}

/* STATUS */
.status{
  margin-top:20px;
  background:#000;
  padding:15px;
  border-radius:10px;
}

</style>
</head>

<body>

<div class="overlay"></div>

<div class="nav">
  <div class="logo">SiumCraft</div>
  <div>
    <a href="index.html">Ana Sayfa</a>
    <a href="tierlist.html">Sıralama</a>
    <a href="panel.html">Panel</a>
    <a href="shop.html">Mağaza</a>
    <a href="support.html">Destek</a>
  </div>
</div>

<div class="hero">
  <h1>SiumCraft</h1>
  <p>SMP & PvP Sunucusu</p>

  <div>
    <button class="btn ip" onclick="kopyala()">IP Kopyala</button>
    <button class="btn dc" onclick="dc()">Discord</button>
    <button class="btn panel" onclick="panel()">Panel</button>
    <button class="btn shop" onclick="shop()">Mağaza</button>
  </div>

  <div class="status">
    <h3>Sunucu Durumu</h3>
    <p id="durum">Yükleniyor...</p>
  </div>

</div>

<script>

function kopyala(){
  navigator.clipboard.writeText("siumcraft.aternos.me");
  alert("IP kopyalandı!");
}

function dc(){
  window.location.href="https://discord.gg/SiumCraft"; // BURAYA KENDİ DC LİNKİNİ KOY
}

function panel(){
  window.location.href="panel.html";
}

function shop(){
  window.location.href="shop.html";
}

// SERVER API
async function durum(){
  let res = await fetch("https://api.mcsrvstat.us/2/siumcraft.aternos.me");
  let data = await res.json();

  if(data.online){
    document.getElementById("durum").innerHTML="🟢 Online";
  }else{
    document.getElementById("durum").innerHTML="🔴 Offline";
  }
}

durum();
setInterval(durum,30000);

</script>

</body>
</html>
