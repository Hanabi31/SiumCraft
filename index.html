<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SiumHost</title>

<style>
body{background:#0a0a0a;color:white;text-align:center;font-family:sans-serif;margin-top:100px;}
input{padding:10px;border-radius:10px;border:none;}
button{padding:10px 20px;background:#00ffcc;border:none;border-radius:10px;}
</style>
</head>

<body>

<h1>🟢 SiumHost</h1>

<input id="nick" placeholder="Kullanıcı adı"><br><br>
<button onclick="giris()">Giriş</button>

<script>
function giris(){
let nick=document.getElementById("nick").value;
if(!nick) return alert("Nick gir!");
localStorage.setItem("nick",nick);
window.location.href="panel.html";
}
</script>

</body>
</html>
