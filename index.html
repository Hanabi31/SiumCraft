<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>SiumCraft</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:sans-serif;
  color:white;
}

/* ARKA PLAN */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  background:url("https://i.imgur.com/3ZQ3Z6G.gif") center/cover no-repeat;
  z-index:-2;
}

.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  z-index:-1;
}

/* ANA */
.container{
  display:flex;
  height:100vh;
}

/* SOL */
.left{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:40px;
}

.left h1{
  font-size:60px;
  text-shadow:0 0 20px #22c55e;
}

.left p{
  margin:10px 0;
  color:#ccc;
  font-size:20px;
}

/* BUTON */
.btn{
  margin-top:10px;
  padding:15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-size:16px;
}

.ip{background:#22c55e;color:black;}
.dc{background:#5865F2;}
.rank{background:#e11d48;}

/* SAĞ PANEL */
.right{
  width:350px;
  display:flex;
  justify-content:center;
  align-items:center;
}

.panel{
  background:#020617;
  padding:30px;
  border-radius:20px;
  box-shadow:0 0 30px #22c55e;
  text-align:center;
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:10px;
}

/* LOGIN */
.login{
  background:#22c55e;
  color:black;
  padding:12px;
  border:none;
  border-radius:10px;
  width:100%;
  cursor:pointer;
}

/* STATUS */
.status{
  margin-top:15px;
  font-size:14px;
}

.online{color:#22c55e;}
.offline{color:red;}

</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="container">

  <!-- SOL -->
  <div class="left">
    <h1>SiumCraft</h1>
    <p>Türkiye'nin en iyi Minecraft sunucusu</p>

    <button class="btn ip" onclick="kopyala()">IP Kopyala</button>
    <button class="btn dc" onclick="dc()">Discord</button>
    <button class="btn rank" onclick="git('tierlist.html')">Sıralama</button>

    <div class="status" id="durum">Yükleniyor...</div>
  </div>

  <!-- SAĞ -->
  <div class="right">
    <div class="panel">
      <h2>Giriş Yap</h2>

      <input id="nick" placeholder="Minecraft Nick">
      <button class="login" onclick="login()">Giriş</button>
    </div>
  </div>

</div>

<script>

function kopyala(){
  navigator.clipboard.writeText("siumcraft.aternos.me");
  alert("IP kopyalandı!");
}

function dc(){
  window.location.href="https://discord.gg/SiumCraft";
}

function git(x){
  window.location.href=x;
}

// LOGIN
function login(){
  let nick = document.getElementById("nick").value;

  if(nick==""){
    alert("Nick gir!");
    return;
  }

  localStorage.setItem("nick", nick);
  window.location.href="panel2.html";
}

// SERVER
async function durum(){
  let res = await fetch("https://api.mcsrvstat.us/2/siumcraft.aternos.me");
  let data = await res.json();

  if(data.online){
    document.getElementById("durum").innerHTML="🟢 Online";
    document.getElementById("durum").className="online";
  }else{
    document.getElementById("durum").innerHTML="🔴 Offline";
    document.getElementById("durum").className="offline";
  }
}

durum();
setInterval(durum,30000);

</script>

</body>
</html>
