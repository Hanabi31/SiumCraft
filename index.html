<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>SiumCraft</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:sans-serif;background:#000;color:white;}

/* NAVBAR */
.nav{
  position:fixed;
  width:100%;
  background:#000;
  padding:15px;
  display:flex;
  justify-content:space-between;
  z-index:10;
}

.menu{
  display:none;
  flex-direction:column;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000;
  padding:40px;
}

.menu a{
  margin:15px 0;
  font-size:20px;
}

/* HERO */
.hero{
  height:100vh;
  background:url("https://wallpapercave.com/wp/wp2757874.jpg") center/cover;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1{
  font-size:50px;
}

.online{
  margin:10px;
  color:#22c55e;
}

.play{
  background:#facc15;
  color:black;
  padding:15px 40px;
  border-radius:15px;
  border:none;
  font-size:20px;
}

/* OYUNLAR */
.section{
  padding:40px;
  text-align:center;
}

.card{
  background:#111;
  margin:20px;
  padding:20px;
  border-radius:15px;
}

/* HABER */
.news img{
  width:100%;
  border-radius:15px;
}

</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <h2>SiumCraft</h2>
  <button onclick="ac()">☰</button>
</div>

<div class="menu" id="menu">
  <button onclick="kapat()">X</button>
  <a href="#">Anasayfa</a>
  <a href="tierlist.html">Sıralama</a>
  <a href="shop.html">Mağaza</a>
  <a href="support.html">Destek</a>
</div>

<!-- HERO -->
<div class="hero">
  <h1>SiumCraft İmparatorluğu</h1>
  <p class="online" id="online">Yükleniyor...</p>
  <button class="play" onclick="kopyala()">OYNA</button>
</div>

<!-- OYUNLAR -->
<div class="section">
  <h2>OYUNLAR</h2>

  <div class="card">
    <h3>🧱 SMP</h3>
    <p>En iyi Smp deneyimi</p>
  </div>

  <div class="card">
    <h3>⚔️ SMP</h3>
    <p>Hayatta kal ve güçlen</p>
  </div>

</div>

<!-- HABER -->
<div class="section news">
  <h2>HABERLER</h2>

  <img src="https://i.imgur.com/1ZQZ1ZQ.jpg">
  <h3>Yeni sezon geliyor!</h3>
  <p>Sunucu yakında sıfırlanacak...</p>
</div>

<script>

// MENU
function ac(){
  document.getElementById("menu").style.display="flex";
}
function kapat(){
  document.getElementById("menu").style.display="none";
}

// IP
function kopyala(){
  navigator.clipboard.writeText("siumcraft.aternos.me");
  alert("IP kopyalandı!");
}

// SERVER
async function durum(){
  let res = await fetch("https://api.mcsrvstat.us/2/siumcraft.aternos.me");
  let data = await res.json();

  if(data.online){
    document.getElementById("online").innerHTML =
      "🟢 "+data.players.online+" oyuncu aktif!";
  }else{
    document.getElementById("online").innerHTML =
      "🔴 Sunucu offline";
  }
}

durum();
setInterval(durum,30000);

</script>

</body>
  </html>
