<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CraftSium.com</title><style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b0f1a;
    color: white;
}

/* ÜST BAR */
.header {
    background: black;
    padding: 15px;
    display: flex;
    justify-content: space-between;
}

.menu-btn {
    font-size: 25px;
    cursor: pointer;
}

/* YAN MENÜ */
.sidebar {
    position: fixed;
    left: -250px;
    top: 0;
    width: 250px;
    height: 100%;
    background: black;
    transition: 0.3s;
    padding-top: 20px;
}

.sidebar a {
    display: block;
    padding: 15px;
    color: white;
    text-decoration: none;
}

.sidebar a:hover {
    background: #222;
}

/* HERO */
.hero {
    text-align: center;
    padding: 60px 20px;
}

.hero h1 {
    font-size: 35px;
}

.highlight {
    color: yellow;
}

/* BUTTON */
.btn {
    background: yellow;
    color: black;
    padding: 10px 20px;
    border-radius: 10px;
    display: inline-block;
    margin-top: 15px;
}

/* CARD */
.card {
    background: #111a2b;
    margin: 15px;
    padding: 15px;
    border-radius: 15px;
}
</style></head><body><!-- HEADER --><div class="header">
<span class="menu-btn" onclick="openMenu()">☰</span>
<div>Sium Craft</div>
</div><!-- SIDEBAR --><div id="menu" class="sidebar">
<a href="#">Anasayfa</a>
<a href="#">Oyunlar</a>
<a href="#">Mağaza</a>
<a href="#">Destek</a>
</div><!-- HERO --><div class="hero">
<h1>SIUM <span class="highlight">CRAFT</span></h1>
<p>En iyi Minecraft sunucusu</p>
<div class="btn">IP: SiumCraft.aternos.me</div>
</div><!-- CONTENT --><div class="card">
<h2>Bilgi</h2>
<p>Sunucu hakkında bilgiler buraya</p>
</div><script>
function openMenu() {
    let menu = document.getElementById("menu");
    if(menu.style.left === "0px"){
        menu.style.left = "-250px";
    } else {
        menu.style.left = "0px";
    }
}
</script></body>
</html>
