<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>SiumCraft</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:sans-serif;
  color:white;
  overflow:hidden;
}

/* YOUTUBE BACKGROUND */
iframe{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-2;
  pointer-events:none;
}

/* DARK OVERLAY */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.65);
  z-index:-1;
}

/* ANA */
.container{
  display:flex;
  height:100vh;
  animation:fade 1.5s ease;
}

/* SOL */
.left{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:60px;
}

.left h1{
  font-size:70px;
  text-shadow:0 0 30px #22c55e;
}

.left p{
  font-size:22px;
  color:#ccc;
  margin:10px 0;
}

/* BUTON */
.btn{
  padding:15px 25px;
  margin:8px 0;
  border:none;
  border-radius:12px;
  font-size:18px;
  cursor:pointer;
  transition:0.2s;
}

.btn:hover{
  transform:scale(1.1);
}

.ip{background:#22c55e;color:black;}
.dc{background:#5865F2;}
.rank{background:#e11d48;}

/* SAĞ PANEL */
.right{
  width:380px;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* GLASS EFFECT */
.panel{
  backdrop-filter:blur(15px);
  background:rgba(255,255,255,0.05);
  border-radius:20px;
  padding:30px;
  width:100%;
  text-align:center;
  box-shadow:0 0 40px rgba(34,197,94,0.5);
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:10px;
}

/* LOGIN */
.login{
  width:100%;
  padding:12px;
  background:#22c55e;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

/* STATUS */
.status{
  margin-top:20px;
  font-size:16px;
}

.online{color:#22c55e;}
.offline{color:red;}

/* ANIMATION */
@keyframes fade{
  from{opacity:0; transform:translateY(40px);}
  to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<!-- YOUTUBE VIDEO -->
<iframe src="https://www.youtube.com/embed/2OEL4P1Rz04?autoplay=1&mute=1&controls=0&loop=1&playlist=2OEL4P1Rz04"></iframe>

<div class="overlay"></div>

<div class="container">

  <!-- SOL -->
  <div class="left">
    <h1>SiumCraft</h1>
    <p>Türkiye'nin en iyi Minecraft sunucusu</p>

    <button class="btn ip" onclick="kopyala()">IP Kopyala</button>
    <button class="btn dc" onclick="dc()">Discord</button>
    <button class="btn rank" onclick="git('tierlist.html')">Sıralama</button>

    <div class="status" id="durum">Yükleniyor...</div>
  </div>

  <!-- SAĞ -->
  <div class="right">
    <div class="panel">
      <h2>🎮 Giriş</h2>

      <input id="nick" placeholder="Minecraft Nick">
      <button class="login" onclick="login()">Giriş Yap</button>
    </div>
  </div>

</div>

<!-- SES -->
<audio id="music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

<script>

// SES (ilk tıklamada başlar)
document.body.addEventListener("click", ()=>{
  document.getElementById("music").play();
},{once:true});

function kopyala(){
  navigator.clipboard.writeText("siumcraft.aternos.me");
  alert("IP kopyalandı!");
}

function dc(){
  window.location.href="https://discord.gg/SiumCraft";
}

function git(x){
  window.location.href=x;
}

// LOGIN
function login(){
  let nick = document.getElementById("nick").value;

  if(nick==""){
    alert("Nick gir!");
    return;
  }

  localStorage.setItem("nick", nick);
  window.location.href="panel2.html";
}

// SERVER API
async function durum(){
  let res = await fetch("https://api.mcsrvstat.us/2/siumcraft.aternos.me");
  let data = await res.json();

  if(data.online){
    document.getElementById("durum").innerHTML="🟢 Sunucu Online";
    document.getElementById("durum").className="online";
  }else{
    document.getElementById("durum").innerHTML="🔴 Sunucu Offline";
    document.getElementById("durum").className="offline";
  }
}

durum();
setInterval(durum,30000);

</script>

</body>
</html>
