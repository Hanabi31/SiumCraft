<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SiumCraft</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
body{background:#000;color:white;overflow-x:hidden;}

/* NAVBAR */
.nav{
position:fixed;
top:0;
width:100%;
background:#0a0a0a;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
z-index:100;
}

.nav h1{color:#00ffcc;}

.menuBtn{
font-size:25px;
background:none;
border:none;
color:white;
}

/* SIDE MENU */
.menu{
position:fixed;
left:-100%;
top:0;
width:100%;
height:100%;
background:#000;
padding:40px;
transition:.4s;
display:flex;
flex-direction:column;
}

.menu a{
color:white;
font-size:22px;
margin:15px 0;
text-decoration:none;
}

.menu.active{left:0;}

/* HERO */
.hero{
height:100vh;
background:url("https://wallpapercave.com/wp/wp2757874.jpg") center/cover;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hero h1{
font-size:55px;
font-weight:900;
}

.hero span{
color:#facc15;
}

.online{
margin:15px;
font-size:18px;
color:#22c55e;
}

.play{
background:#facc15;
border:none;
padding:15px 40px;
border-radius:20px;
font-size:20px;
font-weight:bold;
}

/* COUNTDOWN */
.count{
display:flex;
gap:10px;
margin-top:20px;
}

.box{
background:#111;
padding:10px;
border-radius:10px;
}

/* SECTION */
.section{
padding:50px 20px;
text-align:center;
}

.card{
background:#111;
border-radius:20px;
padding:20px;
margin:20px;
}

/* NEWS */
.news img{
width:100%;
border-radius:20px;
}

/* BUTTONS */
.btn{
background:#00ffcc;
padding:10px 20px;
border-radius:10px;
margin:5px;
display:inline-block;
color:black;
text-decoration:none;
}

</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
<h1>SiumCraft</h1>
<button class="menuBtn" onclick="openMenu()">☰</button>
</div>

<!-- MENU -->
<div class="menu" id="menu">
<button onclick="closeMenu()">X</button>
<a href="#">Anasayfa</a>
<a href="tierlist.html">Sıralama</a>
<a href="shop.html">Mağaza</a>
<a href="support.html">Destek</a>
</div>

<!-- HERO -->
<div class="hero">
<h1><span>SIUM</span>CRAFT</h1>

<p class="online" id="online">Yükleniyor...</p>

<button class="play" onclick="copyIP()">OYNA</button>

<div class="count">
<div class="box" id="gun">0 Gün</div>
<div class="box" id="saat">0 Saat</div>
<div class="box" id="dk">0 Dakika</div>
<div class="box" id="sn">0 Saniye</div>
</div>

</div>

<!-- OYUNLAR -->
<div class="section">
<h2>OYUNLAR</h2>

<div class="card">
<h3>🧱 SMP</h3>
<p>Uzaklara git ve kendi şehrini inşa et</p>
</div>

<div class="card">
<h3>⚔️ BoxPvP</h3>
<p>Gerçek BoxPvP deneyimi</p>
</div>

</div>

<!-- HABER -->
<div class="section news">
<h2>HABERLER</h2>

<img src="https://i.imgur.com/1ZQZ1ZQ.jpg">

<h3>Yeni sezon geliyor!</h3>
<p>23 Nisanda'da reset geliyor 🔥</p>
</div>

<script>

// MENU
function openMenu(){document.getElementById("menu").classList.add("active")}
function closeMenu(){document.getElementById("menu").classList.remove("active")}

// IP
function copyIP(){
navigator.clipboard.writeText("siumcraft.aternos.me");
alert("IP kopyalandı!");
}

// SERVER API
async function loadServer(){
let res = await fetch("https://api.mcsrvstat.us/2/siumcraft.aternos.me");
let data = await res.json();

if(data.online){
document.getElementById("online").innerHTML =
"🟢 "+data.players.online+" oyuncu aktif!";
}else{
document.getElementById("online").innerHTML =
"🔴 Sunucu offline";
}
}

loadServer();
setInterval(loadServer,30000);

// COUNTDOWN
let hedef = new Date("2026-08-15T17:00:00");

function sayac(){
let now = new Date();
let diff = hedef - now;

let gun = Math.floor(diff/(1000*60*60*24));
let saat = Math.floor(diff/(1000*60*60)%24);
let dk = Math.floor(diff/(1000*60)%60);
let sn = Math.floor(diff/1000%60);

document.getElementById("gun").innerText = gun+" Gün";
document.getElementById("saat").innerText = saat+" Saat";
document.getElementById("dk").innerText = dk+" Dakika";
document.getElementById("sn").innerText = sn+" Sn";
}

setInterval(sayac,1000);

</script>

</body>
</html>
