<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SiumCraft</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  height: 100%;
  scroll-behavior: smooth;
}

body {
  font-family: 'Orbitron', sans-serif;
  color: white;
}

/* BACKGROUND FULL */
#bgCanvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  z-index: -1;
  background: linear-gradient(120deg, #0f2027, #203a43, #2c5364);
}

/* NAVBAR FIXED */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  height: 70px;
  background: rgba(0,0,0,0.9);
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 30px;
  z-index: 100;
}

.logo {
  color: #00ffcc;
  font-weight: bold;
}

.navbar ul {
  display: flex;
  list-style: none;
}

.navbar ul li {
  margin-left: 20px;
}

.navbar ul li a {
  cursor: pointer;
  color: white;
}

/* SECTIONS FULL SCREEN */
.section {
  min-height: 100vh;
  padding-top: 90px; /* navbar boşluk */
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* HERO */
.hero h1 {
  font-size: 50px;
}

.hero p {
  margin: 20px 0;
}

/* BUTTON */
.button {
  background: #00ffcc;
  padding: 12px 25px;
  border-radius: 8px;
  color: black;
  margin: 10px;
  cursor: pointer;
}

/* CARDS */
.cards {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  justify-content: center;
}

.card {
  background: rgba(0,0,0,0.7);
  padding: 20px;
  border-radius: 10px;
  width: 200px;
  text-align: center;
}
</style>
</head>

<body>

<canvas id="bgCanvas"></canvas>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">SiumCraft</div>
  <ul>
    <li><a onclick="go('home')">Ana Sayfa</a></li>
    <li><a onclick="go('server')">Sunucu</a></li>
    <li><a onclick="go('shop')">Mağaza</a></li>
    <li><a onclick="go('contact')">İletişim</a></li>
  </ul>
</div>

<!-- HOME -->
<section id="home" class="section hero">
  <h1>SiumCraft</h1>
  <p>En iyi Minecraft deneyimi</p>
  <p id="players">Yükleniyor...</p>

  <div>
    <span class="button" onclick="copyIP()">IP Kopyala</span>
    <a href="minecraft://connect/siumcraft.aternos.me" class="button">Katıl</a>
  </div>
</section>

<!-- SERVER -->
<section id="server" class="section">
  <h2>Sunucu Bilgisi</h2>
  <p>IP: siumcraft.aternos.me</p>
</section>

<!-- SHOP -->
<section id="shop" class="section">
  <h2>Mağaza</h2>
  <div class="cards">
    <div class="card">Gridük - 250₺</div>
    <div class="card">Arşidük - 500₺</div>
  </div>
</section>

<!-- CONTACT -->
<section id="contact" class="section">
  <h2>İletişim</h2>
  <p>Discord ekle</p>
</section>

<script>
// SCROLL FIX
function go(id){
  document.getElementById(id).scrollIntoView();
}

// PARTICLES
const canvas = document.getElementById("bgCanvas");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();

window.addEventListener("resize", resize);

let particles = [];
for(let i=0;i<120;i++){
  particles.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    vx: Math.random()*0.3,
    vy: Math.random()*0.3
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{
    p.x+=p.vx;
    p.y+=p.vy;
    if(p.x>canvas.width)p.x=0;
    if(p.y>canvas.height)p.y=0;
    ctx.fillStyle="#00ffcc";
    ctx.fillRect(p.x,p.y,2,2);
  });
  requestAnimationFrame(draw);
}
draw();

// API
fetch("https://api.mcsrvstat.us/2/siumcraft.aternos.me")
.then(r=>r.json())
.then(d=>{
  document.getElementById("players").innerText =
    d.online ? "🟢 "+d.players.online+" oyuncu" : "🔴 Kapalı";
});

// COPY
function copyIP(){
  navigator.clipboard.writeText("siumcraft.aternos.me");
  alert("IP kopyalandı!");
}
</script>

</body>
</html>
