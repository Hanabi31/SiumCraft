<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SiumCraft</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: url("https://wallpapercave.com/wp/wp2757874.gif") no-repeat center center fixed;
  background-size: cover;
}

/* Overlay */
.overlay {
  background: rgba(0,0,0,0.7);
  min-height: 100vh;
  padding: 20px;
}

/* Panel */
.panel {
  background: rgba(30,30,30,0.9);
  padding: 30px;
  border-radius: 15px;
  max-width: 500px;
  margin: auto;
  text-align: center;
  color: white;
  box-shadow: 0 0 20px #00ff99;
}

h1 {
  margin-bottom: 20px;
}

/* Butonlar */
button {
  padding: 12px 20px;
  margin: 10px;
  border: none;
  border-radius: 10px;
  background: #00ff99;
  cursor: pointer;
  font-size: 16px;
  transition: 0.3s;
}

button:hover {
  background: #00cc77;
}

/* Gizli alan */
.hidden {
  display: none;
}

/* Mağaza liste */
ul {
  list-style: none;
  padding: 0;
}

li {
  background: rgba(255,255,255,0.1);
  margin: 5px;
  padding: 10px;
  border-radius: 8px;
}
</style>

</head>
<body>

<div class="overlay">

  <div class="panel">
    <h1>🎮 SiumCraft Panel</h1>

    <button onclick="openShop()">🛒 Mağaza</button>
    <button onclick="openDiscord()">💬 Discord</button>

    <!-- MAĞAZA -->
    <div id="shop" class="hidden">
      <h2>Mağaza</h2>
      <ul>
        <li>VIP+ - 50 TL</li>
        <li>Grudük - 100 TL</li>
        <li>Arşidük - 200 TL</li>
      </ul>
    </div>

  </div>

</div>

<script>
function openShop() {
  document.getElementById("shop").classList.toggle("hidden");
}

function openDiscord() {
  window.location.href = "https://discord.gg/SiumCraft"; // BURAYA KENDİ LİNKİNİ KOY
}
</script>

</body>
</html>
