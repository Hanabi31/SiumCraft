<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>SiumCraft</title>

<style>
body{
margin:0;
font-family:sans-serif;
color:white;
background:url("https://wallpapercave.com/wp/wp2757874.jpg") center/cover no-repeat;
}

.nav{
display:flex;
justify-content:space-between;
padding:15px;
background:rgba(0,0,0,0.7);
}

.nav a{
color:white;
margin:10px;
text-decoration:none;
}

.hero{
height:90vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.6);
}

button{
padding:12px 20px;
margin:10px;
border:none;
border-radius:10px;
font-weight:bold;
}

.ip{background:#00ffcc;color:black;}
.dc{background:#5865F2;}
</style>
</head>

<body>

<div class="nav">
<h2>SiumCraft</h2>
<div>
<a href="index.html">Ana Sayfa</a>
<a href="tierlist.html">Sıralama</a>
<a href="shop.html">Mağaza</a>
<a href="support.html">Destek</a>
</div>
</div>

<div class="hero">
<h1>SiumCraft Sunucu</h1>

<button class="ip" onclick="copyIP()">IP Kopyala</button>
<button class="dc" onclick="dc()">Discord</button>

<p id="status">Yükleniyor...</p>
</div>

<script>
function copyIP(){
navigator.clipboard.writeText("siumcraft.aternos.me");
alert("IP kopyalandı!");
}

function dc(){
window.location.href="https://discord.gg/SiumCraft";
}

async function load(){
let r = await fetch("https://api.mcsrvstat.us/2/siumcraft.aternos.me");
let d = await r.json();

if(d.online){
document.getElementById("status").innerText =
"🟢 "+d.players.online+" oyuncu aktif";
}else{
document.getElementById("status").innerText =
"🔴 Sunucu kapalı";
}
}

load();
</script>

</body>
</html>
