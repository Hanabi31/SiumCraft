<!DOCTYPE html><html>
<head>
<title>Minecraft Tier List</title>
<style>
body {
    background: #0b1220;
    color: white;
    font-family: Arial;
}.container {
width: 90%;
margin: auto;
}

.card {
background: #111a2b;
padding: 15px;
margin: 15px 0;
border-radius: 15px;
display: flex;
align-items: center;
}

.rank {
font-size: 30px;
font-weight: bold;
margin-right: 15px;
color: gold;
}

.skin {
width: 60px;
height: 60px;
margin-right: 15px;
}

.info {
flex: 1;
}

.name {
font-size: 20px;
}

.region {
padding: 5px 10px;
border-radius: 8px;
font-size: 12px;
}

.eu { background: green; }
.na { background: red; }

.tiers {
margin-top: 5px;
}

.badge {
background: #222;
padding: 5px 8px;
border-radius: 6px;
margin-right: 5px;
display: inline-block;
}
</style>

</head><body><div class="container">
<h1>Minecraft EU Tier List</h1><div class="card">
<div class="rank">#1</div>
<img class="skin" src="https://mc-heads.net/avatar/Notch">
<div class="info">
<div class="name">ItzReal...</div>
<div class="tiers">
<span class="badge">HT3</span>
<span class="badge">HT1</span>
<span class="badge">LT2</span>
</div>
</div>
<div class="region eu">EU</div>
</div><div class="card">
<div class="rank">#2</div>
<img class="skin" src="https://mc-heads.net/avatar/Herobrine">
<div class="info">
<div class="name">coldified</div>
<div class="tiers">
<span class="badge">LT1</span>
<span class="badge">HT2</span>
</div>
</div>
<div class="region na">NA</div>
</div></div></body>
</html>
