<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SiumCraft</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Orbitron',sans-serif;
  color:white;
  overflow-x:hidden;
}

/* BACKGROUND */
#bgCanvas{
  position:fixed;
  width:100%;
  height:100%;
  top:0;
  left:0;
  z-index:-1;
  background:linear-gradient(120deg,#0f2027,#203a43,#2c5364);
}

/* NAVBAR */
.navbar{
  position:fixed;
  width:100%;
  height:70px;
  background:rgba(0,0,0,0.9);
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 20px;
  z-index:999;
}

.logo{color:#00ffcc;font-size:18px;}

.navbar ul{
  display:flex;
  list-style:none;
  flex-wrap:wrap;
}

.navbar li{margin-left:15px;}

.navbar a{
  color:white;
  text-decoration:none;
  font-size:12px;
  cursor:pointer;
}

/* SECTION */
.section{
  min-height:100vh;
  padding-top:90px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

/* HERO */
.hero h1{font-size:45px}
.hero p{margin:15px 0}

/* BUTTON */
.button{
  background:#00ffcc;
  padding:10px 20px;
  border-radius:6px;
  color:black;
  margin:8px;
  display:inline-block;
  cursor:pointer;
  font-size:12px;
  border:none;
}

/* CARDS */
.cards{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
  justify-content:center;
}

.card{
  background:rgba(0,0,0,0.7);
  padding:20px;
  border-radius:10px;
  width:220px;
}

/* MOBILE */
@media(max-width:600px){
  .hero h1{font-size:30px}
  .navbar a{font-size:10px}
}
</style>
</head>

<body>

<canvas id="bgCanvas"></canvas>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">SiumCraft</div>
  <ul>
    <li><a onclick="go('home')">Ana Sayfa</a></li>
    <li><a onclick="go('server')">Sunucu</a></li>
    <li><a onclick="go('shop')">Mağaza</a></li>
    <li><a onclick="go('rules')">Kurallar</a></li>
    <li><a onclick="go('support')">Destek</a></li>
    <li><a onclick="go('contact')">İletişim</a></li>
  </ul>
</div>

<!-- HOME -->
<section id="home" class="section hero">
  <h1>SiumCraft</h1>
  <p
