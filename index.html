<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>SiumCraft</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:sans-serif;
  color:white;
  overflow:hidden;
}

/* ARKA PLAN (GIF / RESİM) */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  background:url("https://i.imgur.com/3ZQ3Z6G.gif") center/cover no-repeat;
  z-index:-2;
}

/* KARARTMA */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:linear-gradient(to top, rgba(0,0,0,0.9), rgba(0,0,0,0.3));
  z-index:-1;
}

/* ANA KUTU */
.box{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

/* BAŞLIK */
h1{
  font-size:60px;
  text-shadow:0 0 20px #22c55e;
}

p{
  color:#ccc;
  margin:10px;
  font-size:20px;
}

/* BUTONLAR */
.buttons{
  margin-top:20px;
}

.btn{
  padding:15px 30px;
  margin:8px;
  border:none;
  border-radius:12px;
  font-size:18px;
  cursor:pointer;
  transition:0.2s;
}

.btn:hover{
  transform:scale(1.1);
}

.ip{background:#22c55e;color:black;}
.dc{background:#5865F2;}
.panel{background:#f59e0b;color:black;}
.rank{background:#e11d48;}

/* SUNUCU DURUM */
.status{
  margin-top:25px;
  background:rgba(0,0,0,0.6);
  padding:15px 25px;
  border-radius:15px;
  font-size:18px;
}

.online{color:#22c55e;}
.offline{color:red;}

</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="box">
  <h1>SiumCraft</h1>
  <p>Türkiye'nin en iyi Minecraft sunucusu</p>

  <div class="buttons">
    <button class="btn ip" onclick="kopyala()">IP Kopyala</button>
    <button class="btn dc" onclick="dc()">Discord</button>
    <button class="btn panel" onclick="git('panel.html')">Panel</button>
    <button class="btn rank" onclick="git('tierlist.html')">Sıralama</button>
  </div>

  <div class="status">
    <span id="durum">Yükleniyor...</span>
  </div>
</div>

<script>

function kopyala(){
  navigator.clipboard.writeText("siumcraft.aternos.me");
  alert("IP kopyalandı!");
}

function dc(){
  window.location.href="https://discord.gg/SiumCraft"; // kendi linkini koy
}

function git(x){
  window.location.href=x;
}

// SERVER API
async function durum(){
  let res = await fetch("https://api.mcsrvstat.us/2/siumcraft.aternos.me");
  let data = await res.json();

  if(data.online){
    document.getElementById("durum").innerHTML="🟢 Sunucu Online";
    document.getElementById("durum").className="online";
  }else{
    document.getElementById("durum").innerHTML="🔴 Sunucu Offline";
    document.getElementById("durum").className="offline";
  }
}

durum();
setInterval(durum,30000);

</script>

</body>
</html>
